<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Plan Your Space · Betson Game-Floor Planner</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='3' y='6' width='26' height='20' rx='2' fill='%230f1419'/%3E%3Crect x='8' y='11' width='16' height='10' rx='1' fill='%231f9d55'/%3E%3C/svg%3E" />
    <!--
      Interactive onboarding WIZARD for the Betson arcade floor-plan optimizer.

      WHAT THIS IS: the richer sibling of web/measure/. Where measure/ captures a
      rectangle + two numbers, this wizard is a BRANCHING flow with three peer entry
      points that route to different subsets of steps:

        Rectangle   → width × depth (the measure/ fast lane)
        Irregular   → draw the room OUTLINE polygon on a sized canvas
        Upload media→ trace the outline over an uploaded plan/photo (with scale calibration)

      …all converging on the same powerful shared tail: HIGHLIGHT THE USABLE AREA — the
      customer paints the green region the engine should count — then door / ceiling /
      obstructions / review. The more the input already carries, the more steps collapse
      from "enter" to "confirm" (a clean CAD upload needs less than a napkin sketch).

      WHY IT REUSES, NOT REBUILDS: the validation + usable math is the SAME engine the
      Python pipeline runs (src/arcade_optimizer/usables). Its browser port,
      validate.js, ALREADY models polygon_ft (outline), usable_polygon_ft
      (the highlighted green box → usable_sqft), extraction_confidence, windows, doors,
      pillars — and already flags usable_exceeds_room / poly_rect_mismatch / degenerate
      polygons. This file is PURE UI over that contract; it changes no engine code, so
      tests/test_measure_js_parity.py stays green by construction.

      Browser-only + static + offline-first by design: no backend, no build step, no
      network, no third-party libs. The SVG geometry editors follow the exact
      createSVGPoint/getScreenCTM pattern proven in ../measure/index.html. (DWG/PDF
      auto-extraction is the future loopback-FastAPI enhancement; image upload + manual
      trace is the offline-safe path that needs nothing.)
    -->
    <style>
      :root {
        --bg: #0f1419;
        --panel: #ffffff;
        --ink: #1a2230;
        --muted: #5b6b80;
        --line: #e3e8ef;
        --brand: #0b63c4;
        --brand-ink: #084a94;
        --green: #1f9d55;
        --green-soft: #e7f6ee;
        --green-line: #1f9d55;
        --amber: #b7791f;
        --amber-soft: #fdf3e2;
        --red: #c0392b;
        --red-soft: #fdecea;
        --shadow: 0 6px 24px rgba(16, 32, 56, 0.12);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(180deg, #f4f7fb 0%, #eef2f8 100%);
        color: var(--ink);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        padding: 0 0 96px;
      }
      .wrap { max-width: 720px; margin: 0 auto; padding: 16px; }
      header.app { padding: 20px 16px 8px; max-width: 720px; margin: 0 auto; }
      header.app h1 { font-size: 1.35rem; margin: 0 0 2px; letter-spacing: -0.01em; }
      header.app p { margin: 0; color: var(--muted); font-size: 0.92rem; }

      /* live mirror */
      /* opaque sticky bar so the uploaded plan (or any tall canvas) scrolls cleanly
         BEHIND the header instead of peeking around a floating, gapped mirror */
      .stickytop {
        position: sticky; top: 0; z-index: 5;
        background: #eef2f8; margin: 0 -16px 16px; padding: 8px 16px 0;
      }
      .mirror {
        background: var(--ink); color: #fff; border-radius: 16px;
        padding: 14px 16px; box-shadow: var(--shadow);
        display: flex; align-items: center; gap: 14px;
      }
      .mirror .count { font-size: 2rem; font-weight: 700; line-height: 1; }
      .mirror .count small { font-size: 0.8rem; font-weight: 500; opacity: 0.8; display: block; margin-top: 3px; }
      .mirror .sqft { color: #c7d2e0; font-size: 0.9rem; }
      .mirror .spacer { flex: 1; }
      .pill {
        font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
        padding: 5px 10px; border-radius: 999px; white-space: nowrap;
      }
      .pill.high { background: var(--green); color: #fff; }
      .pill.medium { background: var(--amber); color: #fff; }
      .pill.low { background: var(--red); color: #fff; }
      .pill.neutral { background: rgba(255, 255, 255, 0.14); color: #cbd5e1; }
      .unittoggle { display: inline-flex; border: 1px solid rgba(255, 255, 255, 0.28); border-radius: 999px; overflow: hidden; }
      .unittoggle button { font: inherit; font-size: 0.78rem; font-weight: 700; padding: 5px 11px; border: 0; background: transparent; color: #cbd5e1; cursor: pointer; }
      .unittoggle button.sel { background: #fff; color: var(--ink); }

      /* progress */
      .steps { display: flex; gap: 6px; margin-bottom: 14px; }
      .steps .dot { flex: 1; height: 5px; border-radius: 999px; background: var(--line); }
      .steps .dot.done { background: var(--brand); }
      .steps .dot.active { background: var(--brand); opacity: 0.55; }

      .card {
        background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
        padding: 20px; box-shadow: var(--shadow);
      }
      .stepno { color: var(--brand); font-weight: 700; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; }
      .card h2 { font-size: 1.18rem; margin: 4px 0 4px; letter-spacing: -0.01em; }
      .card .lead { color: var(--muted); margin: 0 0 16px; font-size: 0.95rem; }

      label.field { display: block; margin: 14px 0; }
      label.field .lab { font-weight: 600; font-size: 0.92rem; display: block; margin-bottom: 6px; }
      .inputrow { display: flex; align-items: stretch; border: 1.5px solid var(--line); border-radius: 12px; overflow: hidden; background: #fff; transition: border-color 0.15s; }
      .inputrow:focus-within { border-color: var(--brand); }
      .inputrow input { flex: 1; border: 0; outline: 0; padding: 13px 14px; font-size: 1.05rem; min-width: 0; background: transparent; color: var(--ink); }
      .inputrow .unit { display: flex; align-items: center; padding: 0 14px; background: #f4f7fb; color: var(--muted); font-weight: 600; font-size: 0.9rem; border-left: 1px solid var(--line); }
      /* inline unit dropdown living in the input's suffix slot (replaces the top toggle) */
      .inputrow .unitsel { border: 0; border-left: 1px solid var(--line); background: #f4f7fb; color: var(--ink); font: inherit; font-weight: 700; font-size: 0.9rem; padding: 0 10px; cursor: pointer; outline: none; }
      .inputrow .unitsel:focus { box-shadow: inset 0 0 0 2px var(--brand); }
      .hinttext { color: var(--muted); font-size: 0.84rem; margin: 6px 2px 0; }
      .tworow { display: flex; gap: 10px; }
      .tworow label.field { flex: 1; }

      /* mode + generic choices */
      .modes { display: grid; grid-template-columns: 1fr; gap: 10px; margin: 6px 0 4px; }
      @media (min-width: 520px) { .modes { grid-template-columns: 1fr 1fr 1fr; } }
      .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 6px 0 4px; }
      .choice { border: 1.5px solid var(--line); border-radius: 12px; padding: 12px; cursor: pointer; text-align: left; background: #fff; font: inherit; color: var(--ink); transition: all 0.12s; }
      .choice:hover { border-color: #c4d2e6; }
      .choice.sel { border-color: var(--brand); background: #f0f6ff; box-shadow: inset 0 0 0 1px var(--brand); }
      .choice .ic2 { font-size: 1.3rem; }
      .choice .t { font-weight: 700; font-size: 0.95rem; }
      .choice .d { color: var(--muted); font-size: 0.82rem; margin-top: 2px; }

      .check { display: flex; gap: 10px; align-items: flex-start; margin: 14px 0; cursor: pointer; }
      .check input { width: 20px; height: 20px; margin-top: 2px; flex: none; accent-color: var(--brand); }
      .check .ct { font-size: 0.92rem; }
      .check .ct small { display: block; color: var(--muted); font-size: 0.82rem; }

      /* flags */
      .flags { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
      .flag { border-radius: 10px; padding: 10px 12px; font-size: 0.88rem; display: flex; gap: 9px; align-items: flex-start; }
      .flag.warning { background: var(--amber-soft); color: #7a5212; }
      .flag.blocking { background: var(--red-soft); color: #8a261b; }
      .flag .ic { font-weight: 800; flex: none; }
      .flag .fx strong { display: block; }
      .flag .fx .hint { opacity: 0.85; margin-top: 2px; }
      .ok-note { margin-top: 14px; background: var(--green-soft); color: #15623a; border-radius: 10px; padding: 10px 12px; font-size: 0.88rem; }

      /* door diagram */
      .diagram { display: flex; justify-content: center; margin: 4px 0 8px; }
      .diagram svg { max-width: 230px; width: 100%; height: auto; }

      /* geometry stage (outline draw / usable highlight / pillar place) */
      .stagewrap { position: relative; margin: 8px 0; }
      svg.stage { width: 100%; touch-action: none; background: #fbfdff; border: 1px solid var(--line); border-radius: 12px; display: block; }
      .stage .vtx { cursor: grab; }
      .stage .vtx:active { cursor: grabbing; }
      .toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 4px; }
      .tool { font: inherit; font-size: 0.84rem; font-weight: 600; border: 1.5px solid var(--line); background: #fff; color: var(--ink); border-radius: 10px; padding: 8px 12px; cursor: pointer; }
      .tool:hover { border-color: #c4d2e6; }
      .tool.warn { color: var(--red); }
      .tool:disabled { opacity: 0.45; cursor: not-allowed; }
      .uploadbox { border: 2px dashed var(--line); border-radius: 12px; padding: 22px; text-align: center; color: var(--muted); cursor: pointer; transition: border-color 0.15s; }
      .uploadbox:hover { border-color: var(--brand); }
      .uploadbox input { display: none; }
      .calibnote { font-size: 0.86rem; color: var(--muted); margin: 6px 2px; }
      .pillarlist { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
      .pillarchip { background: #eef2f8; border-radius: 999px; padding: 4px 10px; font-size: 0.82rem; display: flex; gap: 6px; align-items: center; }
      .pillarchip button { border: 0; background: none; color: var(--red); font-weight: 800; cursor: pointer; font-size: 1rem; line-height: 1; padding: 0; }

      /* nav */
      .nav { display: flex; gap: 10px; margin-top: 20px; }
      button.btn { font: inherit; font-weight: 700; border-radius: 12px; padding: 13px 18px; cursor: pointer; border: 1.5px solid transparent; transition: all 0.12s; }
      button.btn.primary { background: var(--brand); color: #fff; flex: 1; }
      button.btn.primary:hover { background: var(--brand-ink); }
      button.btn.ghost { background: #fff; color: var(--ink); border-color: var(--line); }
      button.btn.ghost:hover { border-color: #c4d2e6; }
      button.btn:disabled { opacity: 0.45; cursor: not-allowed; }

      /* review */
      .review-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--line); }
      .review-line .k { color: var(--muted); }
      .review-line .v { font-weight: 700; text-align: right; }
      .reasons, .caveats { margin: 10px 0 0; padding-left: 18px; }
      .reasons li, .caveats li { font-size: 0.86rem; color: var(--muted); margin: 4px 0; }
      .routebox { border-radius: 12px; padding: 14px; margin: 14px 0; font-size: 0.92rem; }
      .routebox.go { background: var(--green-soft); color: #15623a; }
      .routebox.hold { background: var(--amber-soft); color: #7a5212; }
      details.json { margin-top: 14px; }
      details.json summary { cursor: pointer; font-weight: 600; color: var(--brand); }
      details.json pre { background: #0f1726; color: #d7e2f2; padding: 12px; border-radius: 10px; overflow: auto; font-size: 0.78rem; line-height: 1.45; }
      .sectit { font-weight: 700; margin: 16px 0 4px; font-size: 0.95rem; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <header class="app">
      <h1>Plan your space</h1>
      <p>Draw it, sketch it, or upload a plan — we'll find the usable floor and how many games fit.</p>
    </header>

    <div class="wrap">
      <!-- live mirror (on an opaque sticky bar; unit selection now lives at the inputs) -->
      <div class="stickytop">
        <div class="mirror" id="mirror">
          <div>
            <div class="count" id="mCount">—<small id="mCountSub">games (rough)</small></div>
          </div>
          <div class="spacer"></div>
          <div style="text-align:right">
            <div class="sqft" id="mSqft">choose how to start</div>
            <div style="margin-top:6px"><span class="pill low" id="mPill">incomplete</span></div>
          </div>
        </div>
      </div>

      <div class="steps" id="dots"></div>

      <!-- the active step renders here -->
      <section class="card" id="stepCard"></section>
    </div>

    <script src="validate.js"></script>
    <script>
      (function () {
        "use strict";
        var M = window.BetsonMeasure;

        // ── capture state — a superset of the RoomInput we are building ──────────────
        function freshState() {
          return {
            mode: null,            // 'rectangle' | 'irregular' | 'media'
            // rectangle / irregular extent
            width: null,
            depth: null,
            // geometry (feet, room origin at top-left)
            polygon_ft: [],        // room outline (irregular + media)
            usable_polygon_ft: [], // highlighted usable region (all modes, optional)
            carveUsable: false,    // UI-only: false = whole room is usable, true = plotting a custom area
            // media
            imageDataUrl: null,
            imgNatural: null,      // {w,h} px of the uploaded image
            pxPerFt: null,         // from scale calibration (viewBox units per foot)
            calib: null,           // {a:[px,px], b:[px,px], lengthFt} in viewBox space
            // shared facts
            door: null, doorInside: false, doorUnknown: false,
            doorPos: null,         // [x,y] ft on the perimeter where the door is placed
            doorOpensIn: false,    // true = swings into the room → deducts a clearance from usable
            ceiling: null, ropes: false,
            noObstr: false, pillars: [],
            obstructions: [],      // committed free-draw obstruction polygons (each subtracts from usable)
            obstrDraft: [],        // the obstruction polygon currently being plotted
            units: "ft",           // measurement-entry unit for lengths: 'ft' | 'in' (areas stay sq ft)
          };
        }
        var ui = freshState();

        // dynamic step list, computed per mode. Each entry is a step id.
        function stepList() {
          if (ui.mode === "rectangle")
            return ["size", "usable", "door", "ceiling", "pillars", "review"];
          if (ui.mode === "irregular")
            return ["extent", "outline", "usable", "door", "ceiling", "pillars", "review"];
          if (ui.mode === "media")
            return ["upload", "scale", "outline", "usable", "door", "ceiling", "pillars", "review"];
          return ["start"]; // mode not chosen yet
        }
        var cur = 0; // index into stepList()

        function parseNum(v) {
          if (v === null || v === undefined) return null;
          var s = String(v).trim();
          if (s === "") return null;
          var n = Number(s);
          return Number.isFinite(n) ? n : null;
        }
        function escapeHtml(s) {
          return String(s).replace(/[&<>"]/g, function (c) {
            return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
          });
        }
        // ── measurement units (lengths only; canonical state stays in feet) ───────────
        function uLabel() { return ui.units === "in" ? "in" : "ft"; }
        function ftToU(ft) { return ui.units === "in" ? ft * 12 : ft; }            // feet → display unit
        function uToFt(v) { return v == null ? null : (ui.units === "in" ? v / 12 : v); } // display → feet
        function numU(ft) { return ft == null ? "" : String(Math.round(ftToU(ft) * 100) / 100); }
        function fmtLen(ft) { return (Math.round(ftToU(ft) * 10) / 10).toLocaleString() + " " + uLabel(); }
        // unit selector rendered INLINE in an input's suffix (replaces the old top-bar
        // toggle): pick ft/in right where you type the measurement. Sets ui.units globally.
        function unitSelect() {
          return '<select class="unitsel" aria-label="Measurement unit">' +
            '<option value="ft"' + (ui.units === "ft" ? " selected" : "") + ">ft</option>" +
            '<option value="in"' + (ui.units === "in" ? " selected" : "") + ">in</option></select>";
        }
        function wireUnitSelects() {
          document.querySelectorAll(".unitsel").forEach(function (s) {
            s.value = ui.units;
            s.onchange = function () { if (ui.units !== s.value) { ui.units = s.value; rerender(); } };
          });
        }

        // ── build the neutral RoomInput dict the engine ingests ──────────────────────
        function buildRoom() {
          var doors = [];
          if (!ui.doorUnknown && ui.door !== null) {
            doors = [{ width_in: ui.door, measured_inside: ui.doorInside, location: ui.doorPos, opens_inward: ui.doorOpensIn }];
          } else if (ui.doorUnknown) {
            doors = [{ width_in: null, location: ui.doorPos, opens_inward: ui.doorOpensIn }]; // → assumed 36", flagged
          }
          var poly = ui.polygon_ft.length >= 3 ? ui.polygon_ft.map(function (p) { return [p[0], p[1]]; }) : null;
          var usable = ui.usable_polygon_ft.length >= 3 ? ui.usable_polygon_ft.map(function (p) { return [p[0], p[1]]; }) : null;

          var room = {
            source_format: ui.mode === "media" ? "image" : "manual",
            shape: ui.mode === "rectangle" ? "rectangular" : "irregular",
            ceiling_height_ft: ui.ceiling,
            doors: doors,
            pillars: effectiveObstructions().filter(function (o) { return o.length >= 3; }).map(function (o) {
              var c = polyCentroid(o), b = polyBBox(o);
              return { x_ft: +c[0].toFixed(1), y_ft: +c[1].toFixed(1), w_ft: +(b[2] - b[0]).toFixed(1), d_ft: +(b[3] - b[1]).toFixed(1) };
            }),
            has_ropes_course: ui.ropes,
            notes: [],
          };
          // Rectangle: width×depth is the source of truth (no polygon → engine uses w*d).
          if (ui.mode === "rectangle") {
            room.width_ft = ui.width;
            room.depth_ft = ui.depth;
            room.raw_dimensions_ft = [ui.width, ui.depth].filter(function (d) { return d && d > 0; });
          } else {
            // Irregular / media: the polygon is the room. Omit width/depth so we don't
            // trip poly_rect_mismatch against a rough bounding box.
            room.raw_dimensions_ft = [];
            if (poly) {
              room.polygon_ft = poly;
            } else if (ui.width && ui.depth) {
              // outline not drawn yet → fall back to rough extent so a count still shows
              room.width_ft = ui.width;
              room.depth_ft = ui.depth;
              room.raw_dimensions_ft = [ui.width, ui.depth].filter(function (d) { return d && d > 0; });
            }
            room.notes.push("Outline captured interactively — Betson confirms the true outline.");
          }
          if (usable) room.usable_polygon_ft = usable;
          return room;
        }

        // ── geometry helpers ─────────────────────────────────────────────────────────
        function polyArea(pts) {
          var acc = 0, n = pts.length;
          for (var i = 0; i < n; i++) {
            var a = pts[i], b = pts[(i + 1) % n];
            acc += a[0] * b[1] - b[0] * a[1];
          }
          return Math.abs(acc) / 2;
        }
        function polyBBox(pts) {
          var xs = pts.map(function (p) { return p[0]; });
          var ys = pts.map(function (p) { return p[1]; });
          return [Math.min.apply(null, xs), Math.min.apply(null, ys), Math.max.apply(null, xs), Math.max.apply(null, ys)];
        }
        // feet extent of the current room, for sizing the canvas
        function roomExtentFt() {
          if (ui.polygon_ft.length >= 3) {
            var b = polyBBox(ui.polygon_ft);
            return { w: Math.max(b[2], 1), d: Math.max(b[3], 1) };
          }
          if (ui.width && ui.depth) return { w: ui.width, d: ui.depth };
          return { w: 40, d: 25 }; // neutral default canvas
        }

        // ── door geometry + obstruction/swing deductions (UI-side; engine stays pure) ──
        function roomPoly() {
          if (ui.polygon_ft.length >= 3) return ui.polygon_ft;
          if (ui.width && ui.depth) return [[0, 0], [ui.width, 0], [ui.width, ui.depth], [0, ui.depth]];
          return null;
        }
        function projSeg(p, a, b) {
          var dx = b[0] - a[0], dy = b[1] - a[1], l2 = dx * dx + dy * dy;
          if (l2 === 0) return a.slice();
          var t = ((p[0] - a[0]) * dx + (p[1] - a[1]) * dy) / l2; t = Math.max(0, Math.min(1, t));
          return [a[0] + t * dx, a[1] + t * dy];
        }
        function nearestOnPoly(p, poly) {
          var best = null, bd = Infinity;
          for (var i = 0; i < poly.length; i++) {
            var a = poly[i], b = poly[(i + 1) % poly.length], q = projSeg(p, a, b);
            var d = Math.hypot(p[0] - q[0], p[1] - q[1]);
            if (d < bd) { bd = d; best = { point: q, a: a, b: b }; }
          }
          return best;
        }
        function doorWidthFt() {
          var inch = ui.doorUnknown ? 36 : ui.door;
          return inch && inch > 0 ? inch / 12 : 0;
        }
        // quarter-circle swing-clearance polygon (feet) when the door is placed & opens inward
        function doorSwingPoly() {
          if (!ui.doorPos || !ui.doorOpensIn) return null;
          var w = doorWidthFt(); if (!w) return null;
          var room = roomPoly(); if (!room) return null;
          var near = nearestOnPoly(ui.doorPos, room);
          var dx = near.b[0] - near.a[0], dy = near.b[1] - near.a[1], L = Math.hypot(dx, dy) || 1;
          var wu = [dx / L, dy / L], c = polyCentroid(room), n = [-wu[1], wu[0]];
          if (n[0] * (c[0] - near.point[0]) + n[1] * (c[1] - near.point[1]) < 0) n = [-n[0], -n[1]]; // point inward
          var hinge = [near.point[0] - wu[0] * w / 2, near.point[1] - wu[1] * w / 2];
          var a0 = Math.atan2(wu[1], wu[0]), a1 = Math.atan2(n[1], n[0]);
          var d = a1 - a0; while (d > Math.PI) d -= 2 * Math.PI; while (d < -Math.PI) d += 2 * Math.PI;
          var poly = [hinge.slice()];
          for (var i = 0; i <= 10; i++) { var ang = a0 + d * i / 10; poly.push([hinge[0] + w * Math.cos(ang), hinge[1] + w * Math.sin(ang)]); }
          return poly;
        }
        // The obstructions that COUNT: committed ones plus the boundary currently being
        // drawn (≥3 pts). So a drawn obstruction is subtracted even before "+ Add this
        // obstruction" is clicked, and is never silently dropped on Next — "+ Add" just
        // lets you start ANOTHER one. Fixes drawn-but-not-added obstructions being ignored.
        function effectiveObstructions() {
          if (ui.noObstr) return [];
          var list = ui.obstructions.slice();

          line(res.ready_for_throughput
            ? "Ready to plan - everything checks out; this can go straight to a draft layout."
            : "A Betson specialist will review this with you - the input has open questions to confirm before planning.",
            { size: 10, bold: true, color: res.ready_for_throughput ? "#15623a" : "#7a5212", lead: 6 });
          divider();

          // ── vector floor plan ──
          drawFloorPlan();
          divider();

          // ── why this confidence ──
          line("Why " + String(res.confidence || "").toUpperCase(), { size: 12, bold: true, lead: 2 });
          (res.confidence_reasons || []).forEach(function (rr) { line("-  " + rr, { size: 10, indent: 8, color: "#5b6b80", lead: 2 }); });
          gap(6);

          // ── flags to resolve ──
          if (res.inconsistencies && res.inconsistencies.length) {
            line("Flags to resolve", { size: 12, bold: true, lead: 2 });
            res.inconsistencies.forEach(function (ic) {
              line((ic.severity === "blocking" ? "[blocking]  " : "[warning]  ") + ic.message,
                { size: 10, bold: true, indent: 8, color: ic.severity === "blocking" ? "#8a261b" : "#7a5212", lead: 1 });
              if (ic.hint) line(ic.hint, { size: 9, indent: 22, color: "#5b6b80", lead: 2 });
            });
            gap(6);
          }

          // ── standard caveats ──
          line("Standard caveats", { size: 12, bold: true, lead: 2 });
          (res.caveats || []).forEach(function (cv) { line("-  " + cv, { size: 9, indent: 8, color: "#5b6b80", lead: 2 }); });

          // ── footer on every page ──
          var stamp = ""; try { stamp = new Date().toLocaleString(); } catch (e) {}
          var modeLabel = ui.mode === "media" ? "uploaded plan" : (ui.mode === "irregular" ? "drawn outline" : "rectangle");
          for (var p = 0; p < pages.length; p++) {
            pages[p].push("BT /F1 8 Tf " + rgb("#94a3b8") + " rg " + margin + " " + (margin - 22) +
              " Td (Betson Game-Floor Planner wizard  -  input: " + esc(modeLabel) + (stamp ? "  -  " + esc(stamp) : "") +
              "    |    page " + (p + 1) + " of " + pages.length + ") Tj ET");
          }

          return assemble(plan);

          // draws the plan image + room/usable/pillars into a fixed-height box at the cursor
          function drawFloorPlan() {
            var boxH = 250, boxW = W - 2 * margin;
            need(boxH + 22);
            line("Floor plan (not to scale)", { size: 12, bold: true, lead: 4 });
            var top = y, bottom = y - boxH, left = margin;
            add(rgb("#e3e8ef") + " RG 0.8 w " + left + " " + bottom.toFixed(1) + " " + boxW + " " + boxH + " re S");

            var room = ui.polygon_ft.length >= 3 ? ui.polygon_ft
              : (ui.width && ui.depth ? [[0, 0], [ui.width, 0], [ui.width, ui.depth], [0, ui.depth]] : null);
            if (!room && !plan) {
              add("BT /F1 10 Tf " + rgb("#94a3b8") + " rg " + (left + 12) + " " + (top - 20).toFixed(1) + " Td (No geometry captured yet.) Tj ET");
              y = bottom - 8; return;
            }
            var usable = ui.usable_polygon_ft.length >= 3 ? ui.usable_polygon_ft : room;
            var obstr = effectiveObstructions().filter(function (o) { return o.length >= 3; });
            var swing = doorSwingPoly();
            var pad = 16, bb, s;

            // With an uploaded plan, fit the IMAGE's foot-extent to the box so the whole photo
            // shows with the overlay positioned on it (same as the on-screen review); the room
            // was traced in these feet (1 ft = pxPerFt viewBox units, see makeStage). Otherwise
            // fit the room's bounding box.
            if (plan) {
              var iw = (ui.imgNatural && ui.imgNatural.w) || plan.w, ih = (ui.imgNatural && ui.imgNatural.h) || plan.h;
              var vsc = Math.min(540 / iw, 360 / ih);
              var imgWft = (iw * vsc) / ui.pxPerFt, imgHft = (ih * vsc) / ui.pxPerFt;
              bb = [0, 0, imgWft, imgHft];
              s = Math.min((boxW - 2 * pad) / imgWft, (boxH - 2 * pad) / imgHft);
            } else {
              bb = polyBBox(room);
              s = Math.min((boxW - 2 * pad) / Math.max(bb[2] - bb[0], 1), (boxH - 2 * pad) / Math.max(bb[3] - bb[1], 1));
            }
            var dw = (bb[2] - bb[0]) * s, dh = (bb[3] - bb[1]) * s;
            var ox = left + (boxW - dw) / 2, oyTop = top - (boxH - dh) / 2;   // PDF y grows up → flip
            function mp(ft) { return [ox + (ft[0] - bb[0]) * s, oyTop - (ft[1] - bb[1]) * s]; }
            function path(pts) {
              var d = "";
              pts.forEach(function (pt, i) { var q = mp(pt); d += q[0].toFixed(2) + " " + q[1].toFixed(2) + (i === 0 ? " m " : " l "); });
              return d + "h";
            }
            // uploaded plan as the backdrop: image XObject /Im0, lower-left at (ox, oyTop - dh)
            if (plan) add("q " + dw.toFixed(2) + " 0 0 " + dh.toFixed(2) + " " + ox.toFixed(2) + " " + (oyTop - dh).toFixed(2) + " cm /Im0 Do Q");
            // translucent green usable: fill at 0.30 alpha (/GS1) + opaque stroke, so the plan shows through
            if (usable) add("q /GS1 gs " + rgb("#1f9d55") + " rg " + rgb("#1f9d55") + " RG 2.5 w " + path(usable) + " B Q");
            if (room) add(rgb("#0b63c4") + " RG 2 w " + path(room) + " S");
            // obstructions (translucent red) + inward door swing (translucent blue) + door marker
            obstr.forEach(function (ob) { add("q /GS1 gs " + rgb("#c0392b") + " rg " + rgb("#c0392b") + " RG 1.5 w " + path(ob) + " B Q"); });
            if (swing) add("q /GS1 gs " + rgb("#0b63c4") + " rg " + rgb("#0b63c4") + " RG 1 w " + path(swing) + " B Q");
            if (ui.doorPos) { var dpq = mp(ui.doorPos); add(rgb("#0b63c4") + " rg " + (dpq[0] - 2).toFixed(1) + " " + (dpq[1] - 2).toFixed(1) + " 4 4 re f"); }
            y = bottom - 8;
          }

          // serializes objects → PDF bytes (binary-safe so the embedded JPEG survives) → Blob
          function assemble(plan) {
            var enc = new TextEncoder();
            var chunks = [], len = 0, offsets = [];
            function raw(u8) { chunks.push(u8); len += u8.length; }
            function put(s) { raw(enc.encode(s)); }
            // object numbering: 1 Catalog, 2 Pages, 3 F1, 4 F2, [5 Image], then content/page pairs
            var next = plan ? 6 : 5, contentNums = [], pageNums = [];
            for (var p = 0; p < pages.length; p++) { contentNums.push(next++); pageNums.push(next++); }
            var maxObj = next - 1;
            function objStart(num) { offsets[num] = len; put(num + " 0 obj\n"); }
            function objEnd() { put("\nendobj\n"); }

            put("%PDF-1.4\n");
            objStart(1); put("<< /Type /Catalog /Pages 2 0 R >>"); objEnd();
            objStart(2); put("<< /Type /Pages /Kids [" + pageNums.map(function (k) { return k + " 0 R"; }).join(" ") + "] /Count " + pages.length + " >>"); objEnd();
            objStart(3); put("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>"); objEnd();
            objStart(4); put("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>"); objEnd();
            if (plan) {
              objStart(5);
              put("<< /Type /XObject /Subtype /Image /Width " + plan.w + " /Height " + plan.h +
                  " /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length " + plan.bytes.length + " >>\nstream\n");
              raw(plan.bytes); put("\nendstream"); objEnd();
            }
            var xobj = plan ? " /XObject << /Im0 5 0 R >>" : "";
            var gstate = " /ExtGState << /GS1 << /ca 0.30 /CA 1 >> >>";   // translucent fill for the usable overlay
            for (var q = 0; q < pages.length; q++) {
              var sbytes = enc.encode(pages[q].join("\n"));
              objStart(contentNums[q]); put("<< /Length " + sbytes.length + " >>\nstream\n"); raw(sbytes); put("\nendstream"); objEnd();
              objStart(pageNums[q]); put("<< /Type /Page /Parent 2 0 R /MediaBox [0 0 " + W + " " + H + "]" +
                " /Resources << /Font << /F1 3 0 R /F2 4 0 R >>" + xobj + gstate + " >> /Contents " + contentNums[q] + " 0 R >>"); objEnd();
            }
            var xrefPos = len;
            put("xref\n0 " + (maxObj + 1) + "\n0000000000 65535 f \n");
            for (var i = 1; i <= maxObj; i++) { var off = String(offsets[i]); while (off.length < 10) off = "0" + off; put(off + " 00000 n \n"); }
            put("trailer\n<< /Size " + (maxObj + 1) + " /Root 1 0 R >>\nstartxref\n" + xrefPos + "\n%%EOF");

            var out = new Uint8Array(len), at = 0;
            for (var k = 0; k < chunks.length; k++) { out.set(chunks[k], at); at += chunks[k].length; }
            return new Blob([out], { type: "application/pdf" });
          }
          });
        }

        function recomputeScale() {
          if (ui.calib && ui.calib.a && ui.calib.b && ui.calib.lengthFt && ui.calib.lengthFt > 0) {
            var dx = ui.calib.b[0] - ui.calib.a[0], dy = ui.calib.b[1] - ui.calib.a[1];
            var px = Math.sqrt(dx*dx + dy*dy);
            ui.pxPerFt = px > 0 ? px / ui.calib.lengthFt : null;
          } else ui.pxPerFt = null;
        }

        // ── render orchestration ─────────────────────────────────────────────────────
        function activeStepId() { return stepList()[cur]; }
        function rerender() {
          var id = activeStepId();
          var res = compute();
          var card = document.getElementById("stepCard");
          card.innerHTML = R[id].html(res);
          var list = stepList();
          var dots = document.getElementById("dots"); dots.innerHTML = "";
          for (var i = 0; i < list.length; i++) {
            var dot = document.createElement("div");
            dot.className = "dot" + (i < cur ? " done" : i === cur ? " active" : "");
            dots.appendChild(dot);
          }
          card.querySelectorAll("[data-next]").forEach(function (b) { b.addEventListener("click", function () { go(cur + 1); }); });
          card.querySelectorAll("[data-back]").forEach(function (b) { b.addEventListener("click", function () { go(cur - 1); }); });
          R[id].wire(res);
          wireUnitSelects();
          renderMirror(res);
          rerenderFlags();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
        // light refresh: recompute engine, update mirror + inline flags + the Next gate
        // WITHOUT rebuilding the step DOM (inputs keep focus, canvases keep listeners).
        function rerenderLive() { var res = compute(); renderMirror(res); rerenderFlags(); syncNav(); }
        function rerenderMirrorOnly() { renderMirror(compute()); syncNav(); }
        // Gated steps don't rebuild their DOM on every edit, so the Next button's
        // disabled state must be re-synced live as the gate condition becomes true.
        function nextGate(id) {
          if (id === "size") return !!(ui.width && ui.depth);
          if (id === "extent") return !!(ui.width && ui.depth);
          if (id === "upload") return !!ui.imageDataUrl;
          if (id === "scale") return !!ui.pxPerFt;
          if (id === "outline") return ui.polygon_ft.length >= 3;
          return true;
        }
        function syncNav() {
          var btn = document.querySelector("[data-next]");
          if (btn) btn.disabled = !nextGate(activeStepId());
        }
        function rerenderFlags() {
          var id = activeStepId();
          var box = document.getElementById("flagbox"); if (!box) return;
          var res = compute();
          // Stay quiet on a pristine rectangle size form — no alarming red "missing
          // width/depth" blockers before the customer has typed anything (Draw mode's
          // equivalent step shows nothing on empty, so this also makes the two consistent).
          if (id === "size" && !ui.width && !ui.depth) { box.innerHTML = ""; return; }
          var html = flagsForFields(res, R[id].flags || []);
          if (!html && id === "size" && res.usable_sqft !== null) {
            var gc = res.game_count, gw = gc === 1 ? " game" : " games";
            if (res.usable_sqft > 60000) {
              // UI-only sanity nudge — far beyond a single room, likely a units typo.
              html = '<div class="flag warning"><span class="ic">⚠</span><span class="fx"><strong>' +
                Math.round(res.usable_sqft).toLocaleString() + " sq ft → about " + gc.toLocaleString() + gw +
                " — unusually large for one room.</strong><div class=\"hint\">Double-check the numbers — feet, not inches?</div></span></div>";
            } else {
              html = '<div class="ok-note">✓ ' + Math.round(res.usable_sqft).toLocaleString() + " sq ft → about " + gc.toLocaleString() + gw + ". Looks consistent.</div>";
            }
          }
          box.innerHTML = html;
        }
        function go(n) {
          var list = stepList();
          cur = Math.max(0, Math.min(list.length - 1, n));
          rerender();
        }

        wireUnitToggle();
        rerender();
      })();
    </script>
  </body>
</html>
